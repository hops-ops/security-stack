apiVersion: meta.dev.upbound.io/v2alpha1
kind: Project
metadata:
  name: security-stack
spec:
  dependsOn:
  - apiVersion: pkg.crossplane.io/v1
    kind: Function
    package: xpkg.crossplane.io/crossplane-contrib/function-auto-ready
    version: '>=v0.6.4'
  - apiVersion: pkg.crossplane.io/v1
    kind: Provider
    package: xpkg.crossplane.io/crossplane-contrib/provider-helm
    version: '>=v1'
  - apiVersion: pkg.crossplane.io/v1
    kind: Provider
    package: xpkg.crossplane.io/crossplane-contrib/provider-kubernetes
    version: '>=v1'
  description: Security stack — Trivy Operator (image / IaC / k8s-config scanning)
    + Falco (eBPF runtime threat detection). Cloud-neutral. First pass ships engine
    helm releases only; supply-chain ClusterPolicies / scan-result enforcement / sidekick
    OTel wiring land in subsequent iterations.
  license: Apache-2.0
  maintainer: Patrick Lee Scott <pat@patscott.io>
  readme: |
    # security-stack

    Installs Trivy Operator + Falco on a target Kubernetes cluster.
    Rides on policy-stack — supply-chain ClusterPolicies (added later)
    compose against Kyverno installed by that stack.
  repository: ghcr.io/hops-ops/security-stack
  source: github.com/hops-ops/security-stack
