apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: securitystacks.hops.ops.com.ai
spec:
  group: hops.ops.com.ai
  names:
    kind: SecurityStack
    plural: securitystacks
  scope: Namespaced
  versions:
  - name: v1alpha1
    referenceable: true
    served: true
    schema:
      openAPIV3Schema:
        description: SecurityStack installs Trivy Operator (image / IaC / k8s-config / RBAC / exposed-secret scanning) and Falco (eBPF runtime threat detection) on a target Kubernetes cluster as two Helm releases. Cloud-neutral. Engine-only in this iteration — supply-chain ClusterPolicies, scan-result enforcement, Falcosidekick output routing, and ObserveStack integration ship in subsequent iterations.
        type: object
        properties:
          spec:
            description: SecurityStackSpec defines the desired state.
            type: object
            properties:
              clusterName:
                description: Name of the target cluster. Used as default for helmProviderConfigRef.name, kubernetesProviderConfigRef.name, and resource naming.
                type: string
              managementPolicies:
                description: Management policies for all composed resources. Defaults to ["*"].
                type: array
                items:
                  type: string
                default:
                - "*"
              labels:
                description: Custom labels applied to all managed resources. Merged with the stack defaults (hops.ops.com.ai/managed=true, hops.ops.com.ai/securitystack=<name>).
                type: object
                additionalProperties:
                  type: string
                x-kubernetes-preserve-unknown-fields: true
              helmProviderConfigRef:
                description: Reference to the Helm ProviderConfig. Defaults to clusterName.
                type: object
                properties:
                  name:
                    type: string
                  kind:
                    type: string
                    enum:
                    - ProviderConfig
                    - ClusterProviderConfig
              kubernetesProviderConfigRef:
                description: Reference to the Kubernetes ProviderConfig (used to compose the trivy and falco namespaces). Defaults to clusterName.
                type: object
                properties:
                  name:
                    type: string
                  kind:
                    type: string
                    enum:
                    - ProviderConfig
                    - ClusterProviderConfig
              nodePool:
                description: Optional dedicated Karpenter NodePool for security workloads. When enabled, non-DaemonSet pods are scheduled with workload-type=security and tolerate security=true:NoSchedule; DaemonSets only receive tolerations.
                type: object
                properties:
                  enabled:
                    description: Whether to create a dedicated NodePool. Defaults to false.
                    type: boolean
                    default: false
                  name:
                    description: NodePool name on the target cluster. Defaults to "hops-security".
                    type: string
                  nodeClassName:
                    description: EKS Auto Mode NodeClass to reference. Defaults to "hops-default".
                    type: string
                  limits:
                    description: Karpenter NodePool resource limits. Defaults to nodes=10.
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  requirements:
                    description: Karpenter scheduling requirements. Defaults to amd64/linux spot or on-demand nodes.
                    type: array
                    items:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                  disruption:
                    description: Karpenter disruption settings. Defaults to WhenEmptyOrUnderutilized after 60s.
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
              trivy:
                description: Trivy Operator configuration.
                type: object
                properties:
                  enabled:
                    description: Whether to install Trivy Operator. Defaults to true.
                    type: boolean
                    default: true
                  namespace:
                    description: Namespace for the Trivy Operator Helm release. Defaults to "trivy-system".
                    type: string
                  releaseName:
                    description: Helm release name. Defaults to "trivy-operator".
                    type: string
                  chartVersion:
                    description: Trivy Operator Helm chart version. Default 0.30.0 (app v0.29.x). NOTE — supply-chain hardening (image digest pinning, cosign-verify-the-scanner) deferred to tasks/security-stack-trivy-supply-chain-hardening per CVE-2026-33634 research finding.
                    type: string
                  values:
                    description: Helm values merged on top of the stack's defaults.
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  overrideAllValues:
                    description: Helm values that replace all defaults entirely.
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
              falco:
                description: Falco runtime threat detection configuration.
                type: object
                properties:
                  enabled:
                    description: Whether to install Falco. Defaults to true.
                    type: boolean
                    default: true
                  namespace:
                    description: Namespace for the Falco Helm release. Defaults to "falco".
                    type: string
                  releaseName:
                    description: Helm release name. Defaults to "falco".
                    type: string
                  chartVersion:
                    description: Falco Helm chart version. Default 6.2.0 (app v0.43.x — first release where modern_ebpf is the required default).
                    type: string
                  driver:
                    description: 'Falco kernel driver. Defaults to "modern_ebpf". Legacy "ebpf" deprecated in Falco 0.43 — explicitly disallowed by enum. "kmod" only as documented fallback for kernels < 5.8.'
                    type: string
                    enum:
                    - modern_ebpf
                    - kmod
                    default: modern_ebpf
                  values:
                    description: Helm values merged on top of the stack's defaults.
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  overrideAllValues:
                    description: Helm values that replace all defaults entirely.
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
              kubescape:
                description: 'Kubescape (CNCF Incubating) configuration — posture + framework reports (NSA, MITRE ATT&CK, CIS) at workload + cluster level. In our minimal capability config the node-agent DaemonSet does NOT deploy (gated on runtime-detection capabilities owned by Falco) — Kubescape contributes framework-mapped posture, not per-node CIS. Capabilities are pre-tuned to complement (not duplicate) Trivy + Falco + Kyverno: vulnerabilityScan/runtimeDetection/admissionController disabled; configurationScan + continuousScan + nodeScan enabled.'
                type: object
                properties:
                  enabled:
                    description: Whether to install Kubescape. Defaults to true.
                    type: boolean
                    default: true
                  namespace:
                    description: Namespace for the Kubescape Helm release. Defaults to "kubescape".
                    type: string
                  releaseName:
                    description: Helm release name. Defaults to "kubescape".
                    type: string
                  chartVersion:
                    description: Kubescape Helm chart version (chart kubescape-operator). Default 1.40.1.
                    type: string
                  values:
                    description: Helm values merged on top of the stack's defaults. Use this to override individual capability toggles or extend excludeNamespaces.
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  overrideAllValues:
                    description: Helm values that replace all defaults entirely.
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  storageClass:
                    description: 'StorageClass composed by the stack for the Kubescape storage component PVC (`kubescape-storage`, 5Gi by default). Removes the dependency on the cluster having a default StorageClass for the right CSI driver. Mirrors the knative-stack nats.storageClass pattern. When enabled, persistence.storageClass in the helm values defaults to this SC name (still overridable via spec.kubescape.values).'
                    type: object
                    properties:
                      enabled:
                        description: Whether to compose the StorageClass. Defaults to true when kubescape.enabled.
                        type: boolean
                      name:
                        description: StorageClass name. Defaults to "kubescape".
                        type: string
                      provisioner:
                        description: CSI provisioner. Defaults to "ebs.csi.eks.amazonaws.com" (EKS managed CSI driver). Override for non-EKS clusters (`pd.csi.storage.gke.io`, `disk.csi.azure.com`, `rancher.io/local-path`, etc.).
                        type: string
                      parameters:
                        description: 'CSI provisioner parameters. Defaults to {type: gp3} (EKS gp3 EBS volumes).'
                        type: object
                        additionalProperties:
                          type: string
                      reclaimPolicy:
                        description: Defaults to "Delete".
                        type: string
                        enum: [Delete, Retain]
                      volumeBindingMode:
                        description: Defaults to "WaitForFirstConsumer".
                        type: string
                        enum: [Immediate, WaitForFirstConsumer]
              observe:
                description: 'ObserveStack integration toggle. When enabled (default): Trivy + Falco + Kubescape ServiceMonitors are turned on for Prometheus scraping; Falcosidekick is enabled with OTLP outputs pointing at the Alloy receiver (Falco events → Loki for logs, Tempo for syscall traces); Kubescape prometheusExporter capability is flipped to enable. Operator can still override individual toggles via per-component values: blocks.'
                type: object
                properties:
                  enabled:
                    description: Whether to wire ObserveStack integration. Defaults to true.
                    type: boolean
                    default: true
                  alloyReceiverEndpoint:
                    description: OTLP HTTP endpoint of the ObserveStack Alloy receiver. Defaults to "http://alloy-receiver.monitoring.svc.cluster.local:4318" (the conventional Hops ObserveStack location). Used for OTLP traces (Tempo correlation, syscall source only). Override for non-standard observe-stack namespace or remote-collector setups.
                    type: string
                  lokiEndpoint:
                    description: Loki push endpoint (full URL incl. host + scheme). Defaults to "http://loki-gateway.monitoring.svc.cluster.local". Falcosidekick uses its native Loki output for event logs (chart does NOT support OTLP logs — only traces + metrics — as of falcosidekick 2.31). Routing Falco events through Alloy → Loki is a future iteration.
                    type: string
            required:
            - clusterName
          status:
            description: SecurityStackStatus defines the observed state.
            type: object
            properties:
              ready:
                description: Overall readiness — true when all enabled components are Ready.
                type: boolean
              trivy:
                type: object
                properties:
                  ready:
                    type: boolean
              falco:
                type: object
                properties:
                  ready:
                    type: boolean
              kubescape:
                type: object
                properties:
                  ready:
                    type: boolean
        required:
        - spec
